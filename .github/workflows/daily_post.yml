name: Kuvukiland Daily Job Bot

on:
  schedule:
    # Runs every day at 7:00 AM South Africa time (UTC+2 = 05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:  # allows manual run from GitHub UI anytime

jobs:
  post-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Job Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          python post_jobs.py
