name: Kuvukiland Daily Job Bot

on:
  schedule:
    - cron: '0,30 * * * *'   # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write             # ← Required to save posted.txt back to repo

jobs:
  post-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Job Bot
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: python post_jobs.py

      - name: Save posted.txt back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.txt || true
          git diff --cached --quiet || git commit -m "Update posted.txt [skip ci]"
          git push
